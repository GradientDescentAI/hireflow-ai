<body class="bg-neutral-50 text-on-background h-screen flex overflow-hidden">
<!-- Minimal Back-to-Main Header for Focused Views -->
<header class="absolute top-0 left-0 w-full h-16 bg-surface-container-lowest border-b border-neutral-200 flex items-center px-6 z-10">
<a class="flex items-center gap-2 text-on-surface-variant hover:text-on-background transition-colors" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
<span class="font-medium text-sm">Back to Jobs</span>
</a>
<div class="ml-auto flex items-center gap-2">
<div class="bg-surface-container-highest rounded-full size-8 bg-cover bg-center" data-alt="A small, circular avatar placeholder image for a user profile in a professional application interface, showing a simple abstract shape or initial." style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAJXzBTcu6qtTSv9hoMl_p4sixomXR4JtRsb0X5nsCg9zs5AhBNXyYgHA6nstgBvC1eZ0GgNFINoZYtaPYu7Q08dPGnZIPhg4GZTJP75I20laOSvaoDFY7QX4ih4iixvBV4nrJvIwDd39HEIoyP4h3QDWLcrl4FSXhvn_1-vkPfC8Tt97Ssdarx75UQG_pUs4ivCQZVGzxosfDQmk09JYqF0SP0D5CxKo6L17EUzXeingIAbWz88Hc24F4tv7VIxk7CPzk-hHd75vQ");'></div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center pt-16 px-4 pb-8 overflow-y-auto w-full">
<div class="w-full max-w-2xl">
<!-- Header Section -->
<div class="mb-8 text-center">
<h1 class="text-3xl font-bold text-on-background tracking-tight mb-2">Create a New Job</h1>
<p class="text-on-surface-variant">Start by providing the source content for Riya to extract structured details.</p>
</div>
<!-- Main Input Card -->
<div class="bg-surface-container-lowest rounded-xl border border-neutral-200 shadow-sm p-6 sm:p-8">
<!-- Input Type Toggle -->
<div class="flex items-center justify-center mb-6">
<div class="inline-flex bg-surface-container rounded-lg p-1">
<button class="px-4 py-2 rounded-md bg-surface-container-lowest text-on-background font-medium text-sm shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-primary/20">
                            Paste Description
                        </button>
<button class="px-4 py-2 rounded-md text-on-surface-variant hover:text-on-background font-medium text-sm transition-all focus:outline-none focus:ring-2 focus:ring-primary/20">
                            Enter URL
                        </button>
</div>
</div>
<!-- Textarea Form -->
<div class="space-y-6">
<div>
<label class="block text-sm font-medium text-on-background mb-2" for="jd-input">
                            Job Description Content
                        </label>
<textarea class="w-full h-64 p-4 rounded-lg border border-neutral-200 bg-surface focus:ring-2 focus:ring-primary focus:border-primary resize-none text-sm placeholder:text-outline" id="jd-input" placeholder="Paste the full job description here. Include details about responsibilities, requirements, benefits, and company overview..."></textarea>
</div>
<!-- Actions -->
<div class="flex flex-col items-center pt-4 border-t border-neutral-200">
<button class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-6 py-3 rounded-lg bg-accent-ai text-white font-medium hover:bg-secondary transition-colors focus:outline-none focus:ring-2 focus:ring-accent-ai/50 shadow-sm">
<span class="material-symbols-outlined text-lg">auto_awesome</span>
                            Extract with AI
                            <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<p class="mt-3 text-body-muted text-on-surface-variant text-center max-w-sm">
<span class="font-medium text-accent-ai inline-flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">auto_awesome</span> Riya</span> will extract structured fields. You'll review and edit everything before posting.
                        </p>
</div>
</div>
</div>
<!-- Footer links -->
<div class="mt-6 text-center">
<a class="text-sm font-medium text-primary hover:text-primary-container transition-colors" href="#">Start from scratch instead</a>
</div>
</div>
</main>
